<!doctype html>
<html lang="en" style="color-scheme: dark; background-color: #000;">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Removed Single Page Apps for GitHub Pages script as it conflicts with HashRouter -->

    <!-- SEO — Fallback for crawlers that don't execute JavaScript -->
    <!-- These are managed dynamically by react-helmet-async at runtime -->
    <title data-rh="true">Edit &amp; Kraft — Elevate Your Brand With Timeless Marketing Solutions</title>
    <meta data-rh="true" name="description" content="Edit &amp; Kraft is a premium digital creative agency specializing in social media advertisements, motion graphics, YouTube videos, short-form content, intros &amp; outros. Elevate your brand with scroll-stopping visual experiences." />
    <meta data-rh="true" name="keywords" content="digital marketing, creative agency, motion graphics, social media ads, YouTube production, brand design, India, seo, marketing, affiliate marketing, digital, digital marketing course, digital marketing classes, digital marketing agency, network marketing, ppc, social media marketing, marketing is, marketing strategy, content marketing, digitize, digital marketing online, inbound marketing, market research, email marketing, video marketing, digital marketing jobs, digital marketing company, digital marketing firms, digital marketing services" />
    <meta data-rh="true" name="author" content="Edit &amp; Kraft" />
    <meta data-rh="true" name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta data-rh="true" property="og:title" content="Edit &amp; Kraft — Elevate Your Brand With Timeless Marketing Solutions" />
    <meta data-rh="true" property="og:description" content="Premium digital creative agency crafting scroll-stopping visual experiences for India's leading brands." />
    <meta data-rh="true" property="og:type" content="website" />
    <meta data-rh="true" property="og:url" content="https://editandkraft.in" />
    <meta data-rh="true" property="og:site_name" content="Edit &amp; Kraft" />
    <meta data-rh="true" property="og:image" content="https://editandkraft.in/og-image.jpg" />

    <!-- Twitter Card -->
    <meta data-rh="true" name="twitter:card" content="summary_large_image" />
    <meta data-rh="true" name="twitter:title" content="Edit &amp; Kraft — Elevate Your Brand With Timeless Marketing Solutions" />
    <meta data-rh="true" name="twitter:description" content="Premium digital creative agency crafting scroll-stopping visual experiences for India's leading brands." />
    <meta data-rh="true" name="twitter:image" content="https://editandkraft.in/og-image.jpg" />

    <!-- Preconnect for Google Fonts performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Liquid Glass SVG Filter -->
    <svg width="0" height="0" style="position: absolute; visibility: hidden;">
      <defs>
        <filter id="liquid-refraction">
          <feTurbulence type="turbulence" baseFrequency="0.01" numOctaves="2" result="turbulence" />
          <feDisplacementMap in="SourceGraphic" in2="turbulence" scale="10" xChannelSelector="R" yChannelSelector="G" />
        </filter>
      </defs>
    </svg>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="src/main.jsx"></script>
  </body>
</html>
